{% extends "shop/base.html" %}
{% block title %}Dang nhap{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card tea-card border-0 shadow-sm">
      <div class="card-body p-4">
        <h3 class="mb-3">Dang nhap</h3>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label">Email hoac username</label>
            <input name="username" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label">Mat khau</label>
            <input type="password" name="password" class="form-control" required>
          </div>
          <button class="btn btn-success w-100">Dang nhap</button>
        </form>
        <p class="small mt-3 mb-0">
          Chua co tai khoan?
          <a href="{% url 'shop:register' %}" class="fw-semibold text-decoration-none">Dang ky ngay</a>
        </p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
